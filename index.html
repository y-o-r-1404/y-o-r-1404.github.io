<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charest="UTF-8">
    <meta name="viewport"content="width=device-width,initial-scale=1.0">
    <title>خاطرات ما</title>
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }
      body{
        font-family:'Vazir','Tahoma;,sans-serif;
        background:liner-gradient(135deg,#f5f0ff 0%,#e8d9ff 100%);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
      }
      .container{
        max-width:800px;
        width:100%;
        background:rgba(255,255,255,0.9);
        backdrop-filter:blur(10px);
        border-radius:40px;
        padding:40px 30px;
        box-shadow:0 20px 60px rgba(0,0,0,0.1);
        border:1px solid rgba(255,255,255.0.5);
        animation:fadeIn 1.5s ease;
      }
      @keyframes fadeIn{
        from{opacity:0;transform:translatey(20px);}
        to{opacity:1;transform:translatey(0);}
      }
      h1{
        font-size:2.5rem;
        color:#4a2b7a;
        margin-bottom:20px;
        text-align:center;
        position:relative;
      }
      .heart{
        color:#c44569k;
        font-size:3rem;
        text-align:center;
        margine:20px 0;
        animation:beat 1.2s infinite;
      }
      @keyframes beat{
        0%,100%{transform:scale(1);}
        50%{transform:scale(1.1);}
      }
      .message-box{
        background:white:
        border-radius:30px;
        padding:30px;
        margin:30px;
        box-shadow:0 10px 30px rgba(106,13,173,0.1);
        border-right:5px solid #9b59b6;
      }
      .message-box p{
        font-size:1.2rem;
        line-height:2;
        color:#2d1b3c;
        margin-bottom:15px;
      }
      .highlight{
        background:linear-gradient(120deg,#f6e6ff 0%,#f6e6ff 100%0;
        padding:3px 10px;
        border-radius:20px;
        font-weight:bold;
        color:#6c3483;
      }
      .date{
        text-align:center;
        color:#8e44ad;
        font-size:1.1rem;
        margin:30px 0 20px;
        font-style:italic;
      }
      .gallery-preview{
        display:flex;
        gap:15px;
        justify-content:center;
        flax-wrap:wrap;
        margine:30px 0;
      }
      .photo-placeholder{
        width:100px;
        height:100px;
        background:linear-gradient(45deg,#d5b8ff,#c7a4ff);
        border-radius:20px;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        font-size:2rem;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
        transition:transform 0.3s;
      }
      .photo-placeholder:hover{
        transform:scale(1.05) rotate(2deg);
      }
      
    </style>
  </head>
